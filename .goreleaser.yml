before:
  hooks:
    - go mod tidy

builds:
  - id: lodestone
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - 6
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: freebsd
        goarch: arm64
    main: ./main.go
    binary: lodestone
    ldflags:
      - "-s -w -X github.com/ghobs91/lodestone/internal/version.GitTag={{.Version}}"

archives:
  - id: lodestone
    builds:
      - lodestone
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

release:
  prerelease: auto
  footer: |
    **Full Changelog**: https://github.com/ghobs91/lodestone/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Docker images

    - `docker pull ghcr.io/ghobs91/lodestone:{{ .Tag }}`

    ## What to do next?

    - Read the [documentation](https://lodestone.dev)
    - Join our [Discord server](https://discord.gg/6mFNszX8qM)

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 10
    - title: Other work
      order: 999

nfpms:
  - package_name: lodestone
    homepage: https://lodestone.dev
    maintainer: lodestone <packages@lodestone.dev>
    description: |-
      lodestone is a self-hosted BitTorrent indexer.
    formats:
      - apk
      - deb
      - rpm
      - archlinux
